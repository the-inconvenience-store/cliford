openapi: "3.0.3"
info:
  title: Multi-Auth API
  description: API demonstrating multiple authentication methods
  version: "1.0.0"

servers:
  - url: https://api.example.com/v1
    description: Production

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    oauth2Auth:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.example.com/authorize
          tokenUrl: https://auth.example.com/token
          refreshUrl: https://auth.example.com/refresh
          scopes:
            read: Read access
            write: Write access
            admin: Admin access
        clientCredentials:
          tokenUrl: https://auth.example.com/token
          scopes:
            read: Read access
            write: Write access
  schemas:
    Resource:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner:
          type: string

security:
  - bearerAuth: []

paths:
  /public/status:
    get:
      operationId: getStatus
      summary: Public status endpoint
      tags:
        - public
      security: []
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /resources:
    get:
      operationId: listResources
      summary: List resources (API key or Bearer)
      tags:
        - resources
      security:
        - apiKeyAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Resource list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: createResource
      summary: Create resource (OAuth2 write scope required)
      tags:
        - resources
      security:
        - oauth2Auth:
            - write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /admin/users:
    get:
      operationId: adminListUsers
      summary: Admin user list (Basic auth)
      tags:
        - admin
      security:
        - basicAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    email:
                      type: string
                    role:
                      type: string

  /admin/settings:
    put:
      operationId: updateSettings
      summary: Update settings (OAuth2 admin scope)
      tags:
        - admin
      security:
        - oauth2Auth:
            - admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maintenanceMode:
                  type: boolean
                maxUsers:
                  type: integer
      responses:
        "200":
          description: Updated
